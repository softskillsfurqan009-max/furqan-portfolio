<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Furqan Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
     <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%233b82f6' rx='20'/><text x='50' y='68' font-size='45' text-anchor='middle' fill='white' font-weight='bold'>FR</text></svg>">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;min-height:100vh;background:linear-gradient(125deg,#fefcf5 0%,#fff5e6 35%,#e8f0fe 70%,#f0f4ff 100%);background-size:300%300%;animation:gradientFlow 14s ease infinite;display:flex;align-items:center;justify-content:center;padding:20px;}
        @keyframes gradientFlow{0%{background-position:0%50%;}50%{background-position:100%50%;}100%{background-position:0%50%;}}
        
        /* Floating Shapes */
        .floating-shapes{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;overflow:hidden;pointer-events:none;}
        .shape{position:absolute;background:rgba(59,130,246,0.08);border-radius:50%;animation:float 22s infinite ease-in-out;}
        .shape-1{width:350px;height:350px;top:-100px;right:-100px;animation-duration:28s;}
        .shape-2{width:250px;height:250px;bottom:-80px;left:-80px;animation-duration:20s;animation-delay:2s;}
        .shape-3{width:180px;height:180px;top:30%;left:20%;animation-duration:18s;animation-delay:4s;background:rgba(79,70,229,0.05);}
        .shape-4{width:120px;height:120px;bottom:25%;right:15%;animation-duration:15s;animation-delay:1s;background:rgba(245,158,11,0.05);}
        @keyframes float{0%{transform:translateY(0px) rotate(0deg);}50%{transform:translateY(-40px) rotate(8deg);}100%{transform:translateY(0px) rotate(0deg);}}
        
        /* Login Box - Premium Design with Gaps */
        .login-wrapper{width:100%;max-width:480px;margin:0 auto;}
        .login-box{background:rgba(255,255,255,0.92);backdrop-filter:blur(15px);border-radius:40px;padding:55px 45px;text-align:center;border:1px solid rgba(226,232,240,0.5);box-shadow:0 35px 60px rgba(0,0,0,0.12);transition:0.4s;}
        .login-box:hover{transform:translateY(-8px);box-shadow:0 45px 75px rgba(0,0,0,0.15);}
        
        /* Icon Section */
        .icon-section{margin-bottom:30px;}
        .icon-circle{width:85px;height:85px;background:linear-gradient(135deg,#3b82f6,#38bdf8);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 15px 30px rgba(59,130,246,0.25);}
        .icon-circle i{font-size:2.5rem;color:white;}
        
        /* Title Section */
        .title-section{margin-bottom:15px;}
        .title-section h2{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#1e293b,#334155);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px;}
        .title-section p{color:#64748b;font-size:0.9rem;}
        
        /* Divider */
        .divider{height:2px;background:linear-gradient(90deg,transparent,#e2e8f0,transparent);margin:25px 0 30px;}
        
        /* Form Section - Proper Gaps */
        .form-section{margin-bottom:30px;}
        .input-group{margin-bottom:22px;text-align:left;}
        .input-group label{display:block;margin-bottom:8px;font-weight:600;color:#334155;font-size:0.85rem;}
        .input-group label i{margin-right:8px;color:#3b82f6;}
        .input-group input{width:100%;padding:14px 18px;border:2px solid #e2e8f0;border-radius:20px;font-family:inherit;font-size:1rem;transition:0.3s;background:rgba(255,255,255,0.9);}
        .input-group input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.12);}
        
        /* Button Section */
        .button-section{margin-bottom:25px;}
        .login-btn{width:100%;padding:15px;background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;border:none;border-radius:50px;font-size:1rem;font-weight:700;cursor:pointer;transition:0.3s;display:flex;align-items:center;justify-content:center;gap:10px;}
        .login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 25px rgba(59,130,246,0.35);}
        
        /* Footer Section */
        .footer-section{margin-top:30px;padding-top:20px;border-top:1px solid #e2e8f0;}
        .footer-section p{font-size:0.8rem;color:#94a3b8;}
        .footer-section i{color:#3b82f6;}
        
        /* Alert Messages */
        .error-msg{background:#fee2e2;color:#dc2626;padding:12px 18px;border-radius:20px;margin-bottom:20px;display:none;font-size:0.85rem;text-align:center;}
        .success-msg{background:#dcfce7;color:#16a34a;padding:12px 18px;border-radius:20px;margin-bottom:20px;display:none;font-size:0.85rem;text-align:center;}
        
        @media(max-width:500px){.login-box{padding:40px 25px;}}
    </style>
</head>
<body>
<div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
</div>
<div class="login-wrapper">
    <div class="login-box">
        <!-- Icon Section -->
        <div class="icon-section">
            <div class="icon-circle">
                <i class="fas fa-shield-alt"></i>
            </div>
        </div>
        
        <!-- Title Section -->
        <div class="title-section">
            <h2>Admin Access</h2>
            <p>Enter your credentials to continue</p>
        </div>
        
        <!-- Divider -->
        <div class="divider"></div>
        
        <!-- Alert Messages -->
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        
        <!-- Form Section -->
        <div class="form-section">
            <form id="loginForm">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Enter username" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                
                <!-- Button Section -->
                <div class="button-section">
                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Footer Section -->
        <div class="footer-section">
            <p><i class="fas fa-lock"></i> Secure Admin Panel | Furqan Portfolio</p>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');
        
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        
        try {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                successDiv.style.display = 'block';
                successDiv.innerHTML = '<i class="fas fa-check-circle"></i> Login successful! Redirecting...';
                setTimeout(() => { window.location.href = '/admin'; }, 1000);
            } else {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid credentials! Use <strong>admin / furqan123</strong>';
            }
        } catch (error) {
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = '<i class="fas fa-wifi"></i> Network error. Please try again.';
        }
    });
</script>
</body>
</html>
