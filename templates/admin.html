<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Furqan Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%233b82f6' rx='20'/><text x='50' y='68' font-size='45' text-anchor='middle' fill='white' font-weight='bold'>FR</text></svg>">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#fefcf5;min-height:100vh;}
        
        /* Animated Background */
        .animated-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:linear-gradient(125deg,#fefcf5 0%,#fff5e6 35%,#e8f0fe 70%,#f0f4ff 100%);background-size:300%300%;animation:gradientFlow 14s ease infinite;}
        @keyframes gradientFlow{0%{background-position:0%50%;}50%{background-position:100%50%;}100%{background-position:0%50%;}}
        
        /* Floating Shapes */
        .floating-shapes{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;overflow:hidden;pointer-events:none;}
        .shape{position:absolute;background:rgba(59,130,246,0.07);border-radius:50%;animation:float 22s infinite ease-in-out;}
        .shape-1{width:320px;height:320px;top:10%;left:-100px;animation-duration:26s;}
        .shape-2{width:220px;height:220px;bottom:15%;right:-50px;animation-duration:19s;animation-delay:2s;}
        .shape-3{width:480px;height:480px;top:40%;left:60%;animation-duration:32s;animation-delay:5s;}
        @keyframes float{0%{transform:translateY(0px) rotate(0deg);}50%{transform:translateY(-35px) rotate(6deg);}100%{transform:translateY(0px) rotate(0deg);}}
        
        .container{max-width:1400px;margin:0 auto;padding:30px 20px;position:relative;z-index:2;}
        
        /* Glassmorphism Navbar */
        .navbar{background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-radius:60px;padding:18px 35px;margin-bottom:40px;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(226,232,240,0.7);box-shadow:0 5px 20px rgba(0,0,0,0.03);}
        .logo{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#2563eb,#38bdf8);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .logout-btn{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;padding:10px 28px;border-radius:40px;text-decoration:none;font-weight:600;transition:0.3s;display:inline-flex;align-items:center;gap:8px;}
        .logout-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(239,68,68,0.3);}
        
        /* Premium Tabs */
        .tabs{display:flex;gap:15px;margin-bottom:40px;flex-wrap:wrap;justify-content:center;}
        .tab-btn{background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);padding:14px 30px;border-radius:50px;border:none;font-weight:600;cursor:pointer;transition:0.3s;font-size:1rem;display:inline-flex;align-items:center;gap:10px;}
        .tab-btn i{font-size:1.1rem;}
        .tab-btn:hover{background:rgba(59,130,246,0.1);transform:translateY(-2px);}
        .tab-btn.active{background:#3b82f6;color:white;box-shadow:0 10px 25px rgba(59,130,246,0.3);}
        
        .tab-content{display:none;animation:fadeIn 0.4s ease;}
        .tab-content.active{display:block;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}
        
        /* Premium Cards */
        .card{background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);border-radius:30px;padding:35px;margin-bottom:35px;border:1px solid rgba(226,232,240,0.7);transition:0.3s;}
        .card:hover{transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,0.08);}
        .card h2{font-size:1.6rem;margin-bottom:25px;color:#1e293b;display:flex;align-items:center;gap:12px;border-left:4px solid #3b82f6;padding-left:18px;}
        .card h2 i{color:#3b82f6;font-size:1.8rem;}
        
        /* Premium Form Styles */
        .form-group{margin-bottom:20px;}
        .form-group label{display:block;margin-bottom:8px;font-weight:600;color:#334155;font-size:0.9rem;}
        .form-group label i{margin-right:8px;color:#3b82f6;}
        .form-group input,.form-group textarea{width:100%;padding:14px 18px;border:2px solid #e2e8f0;border-radius:16px;font-family:inherit;font-size:1rem;transition:0.3s;background:rgba(255,255,255,0.9);}
        .form-group input:focus,.form-group textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
        
        /* Premium Buttons */
        .btn{padding:12px 28px;border:none;border-radius:50px;font-weight:600;cursor:pointer;transition:0.3s;font-size:0.95rem;display:inline-flex;align-items:center;gap:8px;}
        .btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;box-shadow:0 5px 15px rgba(59,130,246,0.2);}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(59,130,246,0.3);}
        .btn-warning{background:linear-gradient(135deg,#f59e0b,#d97706);color:white;}
        .btn-warning:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(245,158,11,0.3);}
        
        .btn-group{display:flex;gap:15px;margin-top:25px;flex-wrap:wrap;}
        
        /* Premium Grid Items */
        .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:25px;margin-top:25px;}
        .item-card{background:white;border-radius:24px;padding:22px;border:1px solid #e2e8f0;transition:0.3s;position:relative;overflow:hidden;}
        .item-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(135deg,#3b82f6,#38bdf8);opacity:0;transition:0.3s;}
        .item-card:hover::before{opacity:1;}
        .item-card:hover{transform:translateY(-5px);box-shadow:0 20px 35px rgba(0,0,0,0.1);}
        .item-card h3{margin-bottom:12px;color:#1e293b;display:flex;align-items:center;gap:10px;font-size:1.2rem;}
        .item-card h3 i{color:#3b82f6;font-size:1.3rem;}
        .item-card p{color:#64748b;margin-bottom:12px;line-height:1.5;}
        .tags{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;}
        .tag{background:#e2e8f0;padding:5px 14px;border-radius:30px;font-size:0.75rem;font-weight:500;color:#334155;transition:0.2s;}
        .tag:hover{background:#3b82f6;color:white;}
        
        /* Unread Message Style */
        .item-card.unread{background:#eff6ff;border-left:4px solid #3b82f6;}
        .item-card.unread h3{color:#1e40af;}
        
        /* Premium Action Buttons */
        .action-buttons{display:flex;gap:12px;margin-top:18px;padding-top:12px;border-top:1px solid #e2e8f0;}
        .edit-btn,.delete-btn,.read-btn{padding:8px 18px;border-radius:40px;cursor:pointer;border:none;font-weight:500;transition:0.2s;display:inline-flex;align-items:center;gap:6px;font-size:0.85rem;}
        .edit-btn{background:#3b82f6;color:white;}
        .edit-btn:hover{background:#2563eb;transform:translateY(-2px);}
        .delete-btn{background:#ef4444;color:white;}
        .delete-btn:hover{background:#dc2626;transform:translateY(-2px);}
        .read-btn{background:#10b981;color:white;}
        .read-btn:hover{background:#059669;transform:translateY(-2px);}
        
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
        
        /* Empty State */
        .empty-state{text-align:center;padding:60px 20px;color:#94a3b8;}
        .empty-state i{font-size:4rem;margin-bottom:15px;opacity:0.5;}
        .empty-state p{font-size:1rem;}
        
        /* Badge */
        .badge{display:inline-block;padding:4px 12px;border-radius:30px;font-size:0.7rem;font-weight:600;margin-left:10px;}
        .badge-unread{background:#ef4444;color:white;}
        .badge-read{background:#10b981;color:white;}
        
        @media(max-width:768px){.form-row{grid-template-columns:1fr;}.container{padding:15px;}.card{padding:25px;}}
    </style>
</head>
<body>
<div class="animated-bg"></div>
<div class="floating-shapes"><div class="shape shape-1"></div><div class="shape shape-2"></div><div class="shape shape-3"></div></div>
<div class="container">
    <nav class="navbar">
        <div class="logo"><i class="fas fa-folder-open"></i> Furqan Admin Panel</div>
        <a href="/login" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('projects')"><i class="fas fa-folder"></i> Projects</button>
        <button class="tab-btn" onclick="showTab('skills')"><i class="fas fa-code"></i> Skills</button>
        <button class="tab-btn" onclick="showTab('tools')"><i class="fas fa-tools"></i> Tools</button>
        <button class="tab-btn" onclick="showTab('experience')"><i class="fas fa-briefcase"></i> Experience</button>
        <button class="tab-btn" onclick="showTab('messages')"><i class="fas fa-envelope"></i> Messages</button>
    </div>

    <!-- Projects Tab -->
    <div id="projects-tab" class="tab-content active">
        <div class="card">
            <h2><i class="fas fa-plus-circle"></i> Add New Project</h2>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                <div class="form-row">
                    <div class="form-group"><label><i class="fas fa-tag"></i> Project Title</label><input type="text" id="pTitle" required placeholder="e.g., E-Commerce Website"></div>
                    <div class="form-group"><label><i class="fas fa-icons"></i> Icon Class</label><input type="text" id="pIcon" value="fa-code" placeholder="fa-laptop-code"></div>
                </div>
                <div class="form-group"><label><i class="fas fa-align-left"></i> Description</label><textarea id="pDesc" rows="4" required placeholder="Describe your project in detail..."></textarea></div>
                <div class="form-row">
                    <div class="form-group"><label><i class="fas fa-code-branch"></i> Technologies</label><input type="text" id="pTech" placeholder="React, Tailwind, Supabase"></div>
                    <div class="form-group"><label><i class="fas fa-link"></i> Live URL</label><input type="url" id="pUrl" placeholder="https://your-project.vercel.app"></div>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Project</button>
                    <button type="button" onclick="resetProjectForm()" class="btn btn-warning"><i class="fas fa-undo"></i> Clear Form</button>
                </div>
            </form>
        </div>
        <div class="card">
            <h2><i class="fas fa-list"></i> All Projects</h2>
            <div id="projectsList" class="items-grid">Loading...</div>
        </div>
    </div>

    <!-- Skills Tab -->
    <div id="skills-tab" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-plus-circle"></i> Add New Skill</h2>
            <form id="skillForm">
                <input type="hidden" id="skillId">
                <div class="form-row">
                    <div class="form-group"><label><i class="fas fa-heading"></i> Skill Title</label><input type="text" id="sTitle" required placeholder="e.g., Frontend Development"></div>
                    <div class="form-group"><label><i class="fas fa-icons"></i> Icon Class</label><input type="text" id="sIcon" value="fab fa-html5" placeholder="fab fa-react"></div>
                </div>
                <div class="form-group"><label><i class="fas fa-tags"></i> Tags (comma separated)</label><input type="text" id="sTags" placeholder="HTML5, CSS3, JavaScript, React"></div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Skill</button>
                    <button type="button" onclick="resetSkillForm()" class="btn btn-warning"><i class="fas fa-undo"></i> Clear Form</button>
                </div>
            </form>
        </div>
        <div class="card">
            <h2><i class="fas fa-list"></i> All Skills</h2>
            <div id="skillsList" class="items-grid">Loading...</div>
        </div>
    </div>

    <!-- Tools Tab -->
    <div id="tools-tab" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-plus-circle"></i> Add New Tool</h2>
            <form id="toolForm">
                <input type="hidden" id="toolId">
                <div class="form-row">
                    <div class="form-group"><label><i class="fas fa-heading"></i> Tool Name</label><input type="text" id="tTitle" required placeholder="e.g., Git & GitHub"></div>
                    <div class="form-group"><label><i class="fas fa-icons"></i> Icon Class</label><input type="text" id="tIcon" value="fas fa-tool" placeholder="fab fa-git-alt"></div>
                </div>
                <div class="form-group"><label><i class="fas fa-align-left"></i> Description</label><textarea id="tDesc" rows="2" placeholder="Describe this tool..."></textarea></div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Tool</button>
                    <button type="button" onclick="resetToolForm()" class="btn btn-warning"><i class="fas fa-undo"></i> Clear Form</button>
                </div>
            </form>
        </div>
        <div class="card">
            <h2><i class="fas fa-list"></i> All Tools</h2>
            <div id="toolsList" class="items-grid">Loading...</div>
        </div>
    </div>

    <!-- Experience Tab -->
    <div id="experience-tab" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-plus-circle"></i> Add New Experience</h2>
            <form id="expForm">
                <input type="hidden" id="expId">
                <div class="form-group"><label><i class="fas fa-heading"></i> Position Title</label><input type="text" id="eTitle" required placeholder="e.g., Web Developer Intern"></div>
                <div class="form-row">
                    <div class="form-group"><label><i class="fas fa-building"></i> Company</label><input type="text" id="eCompany" placeholder="Company Name"></div>
                    <div class="form-group"><label><i class="fas fa-calendar"></i> Duration</label><input type="text" id="eDate" placeholder="Mar 2026 – Present"></div>
                </div>
                <div class="form-group"><label><i class="fas fa-align-left"></i> Description</label><textarea id="eDesc" rows="3" placeholder="Describe your role and responsibilities..."></textarea></div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Experience</button>
                    <button type="button" onclick="resetExpForm()" class="btn btn-warning"><i class="fas fa-undo"></i> Clear Form</button>
                </div>
            </form>
        </div>
        <div class="card">
            <h2><i class="fas fa-list"></i> All Experiences</h2>
            <div id="expList" class="items-grid">Loading...</div>
        </div>
    </div>

    <!-- Messages Tab -->
    <div id="messages-tab" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-inbox"></i> Contact Messages</h2>
            <div id="messagesList" class="items-grid">Loading...</div>
        </div>
    </div>
</div>

<script>
    // Check admin login
    async function checkAdmin() {
        try {
            const res = await fetch('/api/admin/check');
            const data = await res.json();
            if (!data.logged_in) {
                window.location.href = '/login';
            }
        } catch(e) {
            window.location.href = '/login';
        }
    }
    checkAdmin();

    // Storage Keys
    const STORAGE_KEYS = {
        projects: 'portfolio_projects',
        skills: 'portfolio_skills',
        tools: 'portfolio_tools',
        experience: 'portfolio_experience'
    };

    // Default Data
    const DEFAULT_PROJECTS = [
        { id: 1, title: 'Dynamic Portfolio Website', icon: 'fa-laptop-code', description: 'A modern, animated portfolio website with responsive design. Built with React and Tailwind CSS.', technologies: ['React', 'Tailwind CSS', 'Framer Motion'], live_url: 'https://osama-pctl.vercel.app' },
        { id: 2, title: 'Accomplishment Portfolio', icon: 'fa-trophy', description: 'Professional portfolio showcasing achievements and milestones.', technologies: ['HTML5', 'CSS3', 'JavaScript'], live_url: 'http://m-aqib-8cvul.vercel.app/accomplishments' },
        { id: 3, title: 'Dasfonix Marketing Agency', icon: 'fa-chart-line', description: 'Results-driven marketing agency. SEO, Google/Meta Ads, content strategy.', technologies: ['SEO', 'Google Ads', 'Meta Ads'], live_url: 'https://dasfonix-marketing-dcpq.vercel.app' }
    ];

    const DEFAULT_SKILLS = [
        { id: 1, title: 'Frontend Core', icon: 'fab fa-html5', tags: ['HTML5', 'CSS3', 'JavaScript', 'Tailwind CSS', 'Bootstrap'] },
        { id: 2, title: 'React & State', icon: 'fab fa-react', tags: ['React.js', 'Redux', 'Node.js', 'REST APIs'] },
        { id: 3, title: 'Backend & DB', icon: 'fas fa-database', tags: ['Supabase', 'PostgreSQL', 'Flask'] },
        { id: 4, title: 'DevOps & Tools', icon: 'fab fa-git-alt', tags: ['Git/GitHub', 'Vercel', 'Netlify', 'Render'] }
    ];

    const DEFAULT_TOOLS = [
        { id: 1, title: 'Version Control', icon: 'fab fa-git-alt', description: 'Git & GitHub for collaborative workflows' },
        { id: 2, title: 'Deployment Platforms', icon: 'fas fa-cloud-upload-alt', description: 'Vercel, Netlify, Render' },
        { id: 3, title: 'Backend as a Service', icon: 'fas fa-database', description: 'Supabase (PostgreSQL, Auth, Realtime)' },
        { id: 4, title: 'Code Editors', icon: 'fas fa-code', description: 'VS Code, Chrome DevTools, Postman' },
        { id: 5, title: 'Design & Prototyping', icon: 'fab fa-figma', description: 'Figma for wireframes' },
        { id: 6, title: 'Build Tools', icon: 'fas fa-terminal', description: 'npm, yarn, Vite, Webpack' }
    ];

    const DEFAULT_EXPERIENCE = [
        { id: 1, title: 'Web Developer Intern', company: '21 Group Of Companies', date: 'Mar 2026 – Present', description: 'Building responsive web apps, debugging, Git workflows, team collaboration.' }
    ];

    function initStorage() {
        if (!localStorage.getItem(STORAGE_KEYS.projects)) localStorage.setItem(STORAGE_KEYS.projects, JSON.stringify(DEFAULT_PROJECTS));
        if (!localStorage.getItem(STORAGE_KEYS.skills)) localStorage.setItem(STORAGE_KEYS.skills, JSON.stringify(DEFAULT_SKILLS));
        if (!localStorage.getItem(STORAGE_KEYS.tools)) localStorage.setItem(STORAGE_KEYS.tools, JSON.stringify(DEFAULT_TOOLS));
        if (!localStorage.getItem(STORAGE_KEYS.experience)) localStorage.setItem(STORAGE_KEYS.experience, JSON.stringify(DEFAULT_EXPERIENCE));
    }

    function getData(key) { return JSON.parse(localStorage.getItem(key)) || []; }
    function saveData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

    function addItem(key, item) {
        let items = getData(key);
        let newId = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
        item.id = newId;
        items.push(item);
        saveData(key, items);
        return items;
    }

    function updateItem(key, id, updatedItem) {
        let items = getData(key);
        let index = items.findIndex(i => i.id == id);
        if (index !== -1) { items[index] = { ...items[index], ...updatedItem, id: parseInt(id) }; saveData(key, items); }
        return items;
    }

    function deleteItem(key, id) {
        let items = getData(key);
        items = items.filter(i => i.id != id);
        saveData(key, items);
        return items;
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`${tab}-tab`).classList.add('active');
        event.target.classList.add('active');
        if (tab === 'projects') loadProjects();
        else if (tab === 'skills') loadSkills();
        else if (tab === 'tools') loadTools();
        else if (tab === 'experience') loadExperience();
        else if (tab === 'messages') loadMessages();
    }

    // Projects CRUD
    function loadProjects() {
        let projects = getData(STORAGE_KEYS.projects);
        let container = document.getElementById('projectsList');
        if (!projects.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i><p>No projects yet. Add your first project above!</p></div>'; return; }
        container.innerHTML = projects.map(p => `
            <div class="item-card">
                <h3><i class="fas ${p.icon}"></i> ${escapeHtml(p.title)}</h3>
                <p>${escapeHtml(p.description?.substring(0,100)||'')}${p.description?.length>100?'...':''}</p>
                <div class="tags">${(p.technologies||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                ${p.live_url ? `<div><i class="fas fa-link"></i> <a href="${p.live_url}" target="_blank" style="color:#3b82f6;">${p.live_url}</a></div>` : ''}
                <div class="action-buttons"><button class="edit-btn" onclick="editProject(${p.id})"><i class="fas fa-edit"></i> Edit</button><button class="delete-btn" onclick="deleteProject(${p.id})"><i class="fas fa-trash"></i> Delete</button></div>
            </div>
        `).join('');
    }

    function saveProject(e) {
        e.preventDefault();
        const id = document.getElementById('projectId').value;
        const data = {
            title: document.getElementById('pTitle').value,
            icon: document.getElementById('pIcon').value,
            description: document.getElementById('pDesc').value,
            technologies: document.getElementById('pTech').value.split(',').map(t=>t.trim()).filter(t=>t),
            live_url: document.getElementById('pUrl').value
        };
        if (id) { updateItem(STORAGE_KEYS.projects, id, data); alert('✅ Project updated successfully!'); }
        else { addItem(STORAGE_KEYS.projects, data); alert('✅ Project added successfully!'); }
        resetProjectForm(); loadProjects();
    }

    function editProject(id) {
        let projects = getData(STORAGE_KEYS.projects);
        let p = projects.find(p => p.id == id);
        if (p) {
            document.getElementById('projectId').value = p.id;
            document.getElementById('pTitle').value = p.title;
            document.getElementById('pIcon').value = p.icon;
            document.getElementById('pDesc').value = p.description;
            document.getElementById('pTech').value = (p.technologies || []).join(', ');
            document.getElementById('pUrl').value = p.live_url || '';
            window.scrollTo({ top: 0 });
        }
    }

    function deleteProject(id) { if (confirm('⚠️ Are you sure you want to delete this project?')) { deleteItem(STORAGE_KEYS.projects, id); loadProjects(); alert('✅ Project deleted!'); } }
    function resetProjectForm() { document.getElementById('projectId').value = ''; document.getElementById('pTitle').value = ''; document.getElementById('pIcon').value = 'fa-code'; document.getElementById('pDesc').value = ''; document.getElementById('pTech').value = ''; document.getElementById('pUrl').value = ''; }

    // Skills CRUD
    function loadSkills() {
        let skills = getData(STORAGE_KEYS.skills);
        let container = document.getElementById('skillsList');
        if (!skills.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-code"></i><p>No skills yet. Add your first skill above!</p></div>'; return; }
        container.innerHTML = skills.map(s => `
            <div class="item-card">
                <h3><i class="${s.icon}"></i> ${escapeHtml(s.title)}</h3>
                <div class="tags">${(s.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                <div class="action-buttons"><button class="edit-btn" onclick="editSkill(${s.id})"><i class="fas fa-edit"></i> Edit</button><button class="delete-btn" onclick="deleteSkill(${s.id})"><i class="fas fa-trash"></i> Delete</button></div>
            </div>
        `).join('');
    }

    function saveSkill(e) {
        e.preventDefault();
        const id = document.getElementById('skillId').value;
        const data = {
            title: document.getElementById('sTitle').value,
            icon: document.getElementById('sIcon').value,
            tags: document.getElementById('sTags').value.split(',').map(t=>t.trim()).filter(t=>t)
        };
        if (id) { updateItem(STORAGE_KEYS.skills, id, data); alert('✅ Skill updated successfully!'); }
        else { addItem(STORAGE_KEYS.skills, data); alert('✅ Skill added successfully!'); }
        resetSkillForm(); loadSkills();
    }

    function editSkill(id) {
        let skills = getData(STORAGE_KEYS.skills);
        let s = skills.find(s => s.id == id);
        if (s) {
            document.getElementById('skillId').value = s.id;
            document.getElementById('sTitle').value = s.title;
            document.getElementById('sIcon').value = s.icon;
            document.getElementById('sTags').value = (s.tags || []).join(', ');
            window.scrollTo({ top: 0 });
        }
    }

    function deleteSkill(id) { if (confirm('⚠️ Are you sure you want to delete this skill?')) { deleteItem(STORAGE_KEYS.skills, id); loadSkills(); alert('✅ Skill deleted!'); } }
    function resetSkillForm() { document.getElementById('skillId').value = ''; document.getElementById('sTitle').value = ''; document.getElementById('sIcon').value = 'fab fa-html5'; document.getElementById('sTags').value = ''; }

    // Tools CRUD
    function loadTools() {
        let tools = getData(STORAGE_KEYS.tools);
        let container = document.getElementById('toolsList');
        if (!tools.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-tools"></i><p>No tools yet. Add your first tool above!</p></div>'; return; }
        container.innerHTML = tools.map(t => `
            <div class="item-card">
                <h3><i class="${t.icon}"></i> ${escapeHtml(t.title)}</h3>
                <p>${escapeHtml(t.description||'')}</p>
                <div class="action-buttons"><button class="edit-btn" onclick="editTool(${t.id})"><i class="fas fa-edit"></i> Edit</button><button class="delete-btn" onclick="deleteTool(${t.id})"><i class="fas fa-trash"></i> Delete</button></div>
            </div>
        `).join('');
    }

    function saveTool(e) {
        e.preventDefault();
        const id = document.getElementById('toolId').value;
        const data = {
            title: document.getElementById('tTitle').value,
            icon: document.getElementById('tIcon').value,
            description: document.getElementById('tDesc').value
        };
        if (id) { updateItem(STORAGE_KEYS.tools, id, data); alert('✅ Tool updated successfully!'); }
        else { addItem(STORAGE_KEYS.tools, data); alert('✅ Tool added successfully!'); }
        resetToolForm(); loadTools();
    }

    function editTool(id) {
        let tools = getData(STORAGE_KEYS.tools);
        let t = tools.find(t => t.id == id);
        if (t) {
            document.getElementById('toolId').value = t.id;
            document.getElementById('tTitle').value = t.title;
            document.getElementById('tIcon').value = t.icon;
            document.getElementById('tDesc').value = t.description || '';
            window.scrollTo({ top: 0 });
        }
    }

    function deleteTool(id) { if (confirm('⚠️ Are you sure you want to delete this tool?')) { deleteItem(STORAGE_KEYS.tools, id); loadTools(); alert('✅ Tool deleted!'); } }
    function resetToolForm() { document.getElementById('toolId').value = ''; document.getElementById('tTitle').value = ''; document.getElementById('tIcon').value = 'fas fa-tool'; document.getElementById('tDesc').value = ''; }

    // Experience CRUD
    function loadExperience() {
        let exps = getData(STORAGE_KEYS.experience);
        let container = document.getElementById('expList');
        if (!exps.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-briefcase"></i><p>No experience yet. Add your first experience above!</p></div>'; return; }
        container.innerHTML = exps.map(e => `
            <div class="item-card">
                <h3>${escapeHtml(e.title)}</h3>
                <p><strong>${escapeHtml(e.company||'')}</strong> | ${escapeHtml(e.date||'')}</p>
                <p>${escapeHtml(e.description||'')}</p>
                <div class="action-buttons"><button class="edit-btn" onclick="editExp(${e.id})"><i class="fas fa-edit"></i> Edit</button><button class="delete-btn" onclick="deleteExp(${e.id})"><i class="fas fa-trash"></i> Delete</button></div>
            </div>
        `).join('');
    }

    function saveExp(e) {
        e.preventDefault();
        const id = document.getElementById('expId').value;
        const data = {
            title: document.getElementById('eTitle').value,
            company: document.getElementById('eCompany').value,
            date: document.getElementById('eDate').value,
            description: document.getElementById('eDesc').value
        };
        if (id) { updateItem(STORAGE_KEYS.experience, id, data); alert('✅ Experience updated successfully!'); }
        else { addItem(STORAGE_KEYS.experience, data); alert('✅ Experience added successfully!'); }
        resetExpForm(); loadExperience();
    }

    function editExp(id) {
        let exps = getData(STORAGE_KEYS.experience);
        let e = exps.find(e => e.id == id);
        if (e) {
            document.getElementById('expId').value = e.id;
            document.getElementById('eTitle').value = e.title;
            document.getElementById('eCompany').value = e.company || '';
            document.getElementById('eDate').value = e.date || '';
            document.getElementById('eDesc').value = e.description || '';
            window.scrollTo({ top: 0 });
        }
    }

    function deleteExp(id) { if (confirm('⚠️ Are you sure you want to delete this experience?')) { deleteItem(STORAGE_KEYS.experience, id); loadExperience(); alert('✅ Experience deleted!'); } }
    function resetExpForm() { document.getElementById('expId').value = ''; document.getElementById('eTitle').value = ''; document.getElementById('eCompany').value = ''; document.getElementById('eDate').value = ''; document.getElementById('eDesc').value = ''; }

    // Messages CRUD
    async function loadMessages() {
        try {
            const res = await fetch('/api/messages');
            const messages = await res.json();
            const container = document.getElementById('messagesList');
            if (!messages.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>No messages yet</p></div>';
                return;
            }
            container.innerHTML = messages.map(m => `
                <div class="item-card ${m.status === 'unread' ? 'unread' : ''}">
                    <h3><i class="fas fa-user"></i> ${escapeHtml(m.name)} <span class="badge ${m.status === 'unread' ? 'badge-unread' : 'badge-read'}">${m.status === 'unread' ? 'Unread' : 'Read'}</span></h3>
                    <p><i class="fas fa-envelope"></i> ${escapeHtml(m.email)}</p>
                    <p><i class="fas fa-calendar"></i> ${escapeHtml(m.date)}</p>
                    <p><strong>Message:</strong><br>${escapeHtml(m.message)}</p>
                    <div class="action-buttons">
                        ${m.status === 'unread' ? `<button class="read-btn" onclick="markAsRead(${m.id})"><i class="fas fa-check"></i> Mark as Read</button>` : ''}
                        <button class="delete-btn" onclick="deleteMessage(${m.id})"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function markAsRead(id) {
        const res = await fetch(`/api/messages/${id}/read`, { method: 'PUT' });
        if (res.ok) { loadMessages(); alert('✅ Marked as read!'); }
    }

    async function deleteMessage(id) {
        if (confirm('⚠️ Delete this message?')) {
            const res = await fetch(`/api/messages/${id}`, { method: 'DELETE' });
            if (res.ok) { loadMessages(); alert('✅ Deleted!'); }
        }
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

    initStorage();
    document.getElementById('projectForm').addEventListener('submit', saveProject);
    document.getElementById('skillForm').addEventListener('submit', saveSkill);
    document.getElementById('toolForm').addEventListener('submit', saveTool);
    document.getElementById('expForm').addEventListener('submit', saveExp);
    loadProjects();
</script>
</body>
</html>
